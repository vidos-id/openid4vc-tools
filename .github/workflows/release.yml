name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install

      - run: bun run check-types

      - run: bun test

      - run: bun run build

      - name: Publish GitHub Packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}
        run: |
          bun publish --cwd packages/cli-common
          bun publish --cwd packages/wallet
          bun publish --cwd packages/issuer
          bun publish --cwd packages/wallet-cli
          bun publish --cwd packages/issuer-cli

      - name: Prepare release artifacts
        run: |
          cp dist/wallet-cli/index.js wallet-cli.js
          cp dist/issuer-cli/index.js issuer-cli.js
          chmod +x wallet-cli.js issuer-cli.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wallet-cli.js
            issuer-cli.js
