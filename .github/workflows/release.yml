name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install

      - run: bun run check-types

      - run: bun test

      - run: bun run build

      - name: Publish GitHub Packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
        run: |
          bun publish --cwd packages/cli-common --registry=https://npm.pkg.github.com
          bun publish --cwd packages/wallet --registry=https://npm.pkg.github.com
          bun publish --cwd packages/issuer --registry=https://npm.pkg.github.com
          bun publish --cwd packages/wallet-cli --registry=https://npm.pkg.github.com
          bun publish --cwd packages/issuer-cli --registry=https://npm.pkg.github.com

      - name: Prepare release artifacts
        run: |
          cp dist/openid4vc-wallet/index.js openid4vc-wallet.js
          cp dist/openid4vc-issuer/index.js openid4vc-issuer.js
          chmod +x openid4vc-wallet.js openid4vc-issuer.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .release_notes.md
          files: |
            openid4vc-wallet.js
            openid4vc-issuer.js
